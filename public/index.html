<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Verifier</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #333;
      font-weight: 500;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .result {
      margin-top: 30px;
      display: none;
    }

    .result.show {
      display: block;
    }

    .result-box {
      background: #f5f5f5;
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 15px;
    }

    .status {
      font-weight: 600;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .status.valid {
      color: #4caf50;
    }

    .status.invalid {
      color: #f44336;
    }

    .details {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }

    .details div {
      margin-bottom: 8px;
    }

    .suggestion {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 12px 15px;
      border-radius: 4px;
      font-size: 14px;
      color: #856404;
    }

    .error {
      background: #ffebee;
      border-left: 4px solid #f44336;
      padding: 12px 15px;
      border-radius: 4px;
      font-size: 14px;
      color: #c62828;
    }

    .loading {
      text-align: center;
      color: #667eea;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✉️ Email Verifier</h1>
    <p class="subtitle">Check if an email address is valid and get suggestions for typos</p>

    <form id="verifyForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="user@example.com"
          required
        />
      </div>
      <button type="submit" id="submitBtn">Verify Email</button>
    </form>

    <div class="result" id="result">
      <div class="result-box">
        <div class="status" id="status"></div>
        <div class="details" id="details"></div>
      </div>
      <div id="suggestion"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById("verifyForm");
    const emailInput = document.getElementById("email");
    const submitBtn = document.getElementById("submitBtn");
    const resultDiv = document.getElementById("result");
    const statusDiv = document.getElementById("status");
    const detailsDiv = document.getElementById("details");
    const suggestionDiv = document.getElementById("suggestion");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();

      if (!email) {
        alert("Please enter an email address");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Verifying...";

      try {
        const response = await fetch("/api/verify", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ email }),
        });

        const data = await response.json();

        if (response.ok) {
          displayResult(data);
        } else {
          displayError(data.error);
        }
      } catch (error) {
        displayError("Failed to verify email. Please try again.");
        console.error("Error:", error);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Verify Email";
      }
    });

    function displayResult(data) {
      const { email, verification, suggestion } = data;

      const isValid = verification.valid;
      statusDiv.textContent = isValid ? "✓ Valid Email" : "✗ Invalid Email";
      statusDiv.className = `status ${isValid ? "valid" : "invalid"}`;

      let details = `
        <div><strong>Email:</strong> ${email}</div>
        <div><strong>Valid:</strong> ${isValid ? "Yes" : "No"}</div>
      `;

      if (verification.reason) {
        details += `<div><strong>Reason:</strong> ${verification.reason}</div>`;
      }

      detailsDiv.innerHTML = details;

      suggestionDiv.innerHTML = "";
      if (suggestion && suggestion !== email) {
        suggestionDiv.innerHTML = `
          <div class="suggestion">
            💡 <strong>Did you mean:</strong> ${suggestion}?
          </div>
        `;
      }

      resultDiv.classList.add("show");
    }

    function displayError(error) {
      suggestionDiv.innerHTML = `<div class="error">❌ ${error}</div>`;
      resultDiv.classList.add("show");
    }
  </script>
</body>
</html>
